<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDVANCE BLE Mesh Flasher</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; line-height: 1.5; }
        h1 { color: #d35400; }
        .card { background: #f4f4f4; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        select { padding: 0.5rem; font-size: 1rem; margin-right: 1rem; }
        /* Import the web tools component */
        script { display: none; } 
    </style>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
</head>
<body>
    <h1>LEDVANCE BLE Mesh Flasher</h1>
    <p>Connect your ESP device via USB and click the button below to flash the latest firmware.</p>

    <div class="card">
        <label for="branchType">Select Branch:</label>
        <select id="branchType">
            <option value="dev">dev</option>
        </select>

        <br><br>

        <label for="chipType">Select your Chip Type:</label>
        <select id="chipType">
            <option value="esp32">ESP32 (Standard)</option>
            <option value="esp32c3">ESP32-C3</option>
            <option value="esp32c6">ESP32-C6</option>
            <option value="esp32s3">ESP32-S3</option>
        </select>

        <br><br>

        <esp-web-install-button id="installButton" manifest="firmware/dev/esp32/manifest.json"></esp-web-install-button>
    </div>

    <script>
        const chipSelect = document.getElementById('chipType');
        const branchSelect = document.getElementById('branchType');
        const button = document.getElementById('installButton');

        function updateManifest() {
            const chip = chipSelect.value;
            const branch = branchSelect.value;
            button.manifest = `firmware/${branch}/${chip}/manifest.json`;
            console.log(`Switched to branch: ${branch}, chip: ${chip}`);
        }

        chipSelect.addEventListener('change', updateManifest);
        branchSelect.addEventListener('change', updateManifest);

        // Fetch available branches dynamically
        fetch('branches.json')
            .then(res => res.json())
            .then(branches => {
                if (branches && branches.length > 0) {
                    branchSelect.innerHTML = '';
                    branches.forEach(b => {
                        const opt = document.createElement('option');
                        opt.value = b;
                        opt.textContent = b;
                        branchSelect.appendChild(opt);
                    });
                    
                    if (branches.includes('dev')) {
                        branchSelect.value = 'dev';
                    } else {
                        branchSelect.value = branches[0];
                    }
                    updateManifest();
                }
            })
            .catch(err => console.warn("Could not load branches.json, using default options", err));
    </script>
</body>
</html>
