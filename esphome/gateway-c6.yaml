# ESPHome BLE Mesh Gateway — ESP32-C6 (local development)
#
# Uses local component path for development.
# For production, use the git source in gateway-c6-ha.yaml.

esphome:
  name: ble-mesh-gateway-c6
  friendly_name: BLE Mesh Gateway C6

external_components:
  - source:
      type: local
      path: components

ble_mesh_gateway:
  id: mesh_gateway

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  watchdog_timeout: 30s
  toolchain: esp-idf
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BLE_MESH: "y"
      CONFIG_BLE_MESH_NODE: "y"
      CONFIG_BLE_MESH_PB_GATT: "y"
      CONFIG_BLE_MESH_PB_ADV: "y"
      CONFIG_BLE_MESH_GENERIC_SERVER: "y"
      CONFIG_BLE_MESH_GENERIC_CLIENT: "y"
      CONFIG_BLE_MESH_LIGHTING_CLIENT: "y"
      CONFIG_BLE_MESH_GENERIC_ONOFF_CLI: "y"
      CONFIG_BLE_MESH_GENERIC_LEVEL_CLI: "y"
      CONFIG_BLE_MESH_LIGHT_LIGHTNESS_CLI: "y"
      CONFIG_BLE_MESH_LIGHT_CTL_CLI: "y"
      CONFIG_BLE_MESH_NET_BUF_COUNT: "160"
      CONFIG_BLE_MESH_ADV_BUF_COUNT: "160"
      CONFIG_BLE_MESH_RX_SEG_MAX: "20"
      CONFIG_BLE_MESH_TX_SEG_MAX: "20"
      CONFIG_BLE_MESH_RELAY_MSG_COUNT: "20"
      CONFIG_BT_ENABLED: "y"
      CONFIG_BLE_MESH_SETTINGS: "y"

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

logger:
  level: DEBUG

api:
  max_connections: 8
  services:
    # Raw OnOff
    - service: set_mesh_onoff
      variables:
        address: int
        state: int
        use_ack: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_onoff((uint16_t)address, state != 0, use_ack != 0);

    # Raw Lightness SET (0-65535)
    - service: set_mesh_lightness
      variables:
        address: int
        level: int
        use_ack: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_level((uint16_t)address, (uint16_t)level, use_ack != 0);

    # Raw CTL SET (lightness + temperature)
    - service: set_mesh_ctl
      variables:
        address: int
        lightness: int
        temperature: int
        use_ack: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_ctl((uint16_t)address, (uint16_t)lightness,
                                    (uint16_t)temperature, 0, use_ack != 0);

    # Legacy brightness (0-100 percent)
    - service: set_mesh_light
      variables:
        address: int
        brightness: int
        max_level: int
      then:
        - lambda: |-
            static std::map<uint16_t, uint32_t> last_sends;
            float bright_f = brightness / 100.0f;
            id(mesh_gateway).control_light(address, bright_f, last_sends[address], max_level);

    # Legacy HSL color
    - service: set_mesh_light_hsl
      variables:
        address: int
        brightness: int
        hue: int
        saturation: int
        max_level: int
      then:
        - lambda: |-
            static std::map<uint16_t, uint32_t> last_sends;
            float bright_f = brightness / 100.0f;
            float hue_f = (float)hue;
            float sat_f = saturation / 100.0f;
            id(mesh_gateway).control_light_hsl(address, bright_f, hue_f, sat_f, last_sends[address], max_level);

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "BLE Mesh Gateway C6 Fallback"
    password: ""

# --- Example: Brightness-only lamp ---
output:
  - platform: template
    id: mesh_output_0020
    type: float
    write_action:
      - lambda: |
          static uint32_t last = 0;
          id(mesh_gateway).control_light(0x0020, state, last, 65535);

  - platform: template
    id: mesh_output_0015
    type: float
    write_action:
      - lambda: |
          static uint32_t last = 0;
          id(mesh_gateway).control_light(0x0015, state, last, 65535);

light:
  - platform: monochromatic
    name: "Tischlampe"
    id: mesh_light_0020
    output: mesh_output_0020
    gamma_correct: 1.0
    default_transition_length: 0s

  - platform: monochromatic
    name: "Flur"
    id: mesh_light_0015
    output: mesh_output_0015
    gamma_correct: 1.0
    default_transition_length: 0s
