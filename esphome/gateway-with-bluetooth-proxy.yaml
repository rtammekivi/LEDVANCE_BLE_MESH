# Combined Bluetooth proxy + LEDVANCE BLE Mesh gateway — ESP32 (standard)
#
# Full working example: Home Assistant bluetooth_proxy and the mesh gateway
# sharing one ESP32, with lamp-side transitions, a provisioning-mode switch
# and periodic burst-poll state readback (see the mesh_poll script).
#
# Lamps: LEDVANCE SMART+ BT (e.g. AC32941, Telink-based). NOTE: these expect
# lightness on a 0-100 scale, not SIG 0-65535 — hence max_level 100 below.
# Provision lamps + gateway with the nRF Mesh app; subscribe each lamp's
# OnOff and Lightness servers to the group address (0xC000 here).

esphome:
  name: ble-mesh-proxy-gateway
  friendly_name: BLE Mesh Proxy Gateway

esp32:
  board: esp32dev
  toolchain: esp-idf
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BLE_MESH: "y"
      CONFIG_BLE_MESH_NODE: "y"
      CONFIG_BLE_MESH_PB_GATT: "y"
      CONFIG_BLE_MESH_PB_ADV: "y"
      CONFIG_BLE_MESH_GENERIC_SERVER: "y"
      CONFIG_BLE_MESH_GENERIC_CLIENT: "y"
      CONFIG_BLE_MESH_LIGHTING_CLIENT: "y"
      CONFIG_BLE_MESH_GENERIC_ONOFF_CLI: "y"
      CONFIG_BLE_MESH_GENERIC_LEVEL_CLI: "y"
      CONFIG_BLE_MESH_LIGHT_LIGHTNESS_CLI: "y"
      CONFIG_BLE_MESH_LIGHT_CTL_CLI: "y"
      CONFIG_BLE_MESH_NET_BUF_COUNT: "160"
      CONFIG_BLE_MESH_ADV_BUF_COUNT: "160"
      CONFIG_BLE_MESH_RX_SEG_MAX: "20"
      CONFIG_BLE_MESH_TX_SEG_MAX: "20"
      CONFIG_BLE_MESH_RELAY_MSG_COUNT: "20"
      CONFIG_BT_ENABLED: "y"
      CONFIG_BT_GATTS_ENABLE: "y"
      CONFIG_BLE_MESH_SETTINGS: "y"
      CONFIG_BLE_MESH_STORE_TIMEOUT: "2"
      CONFIG_BLE_MESH_SEQ_STORE_RATE: "120"

logger:

api:
  custom_services: true
  homeassistant_services: true
  actions:
    - action: set_mesh_onoff
      variables:
        address: int
        state: int
        use_ack: int
        transition_ms: int
        delay_ms: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_onoff((uint16_t)address, state != 0, use_ack != 0,
                                       (uint32_t)transition_ms, (uint16_t)delay_ms);
    - action: set_mesh_lightness
      variables:
        address: int
        level: int
        use_ack: int
        transition_ms: int
        delay_ms: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_level((uint16_t)address, (uint16_t)level, use_ack != 0,
                                       (uint32_t)transition_ms, (uint16_t)delay_ms);
    - action: set_mesh_gen_level
      variables:
        address: int
        level: int
        use_ack: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_gen_level((uint16_t)address, (int16_t)level, use_ack != 0);

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "BLE Mesh Gateway Fallback"
    password: ""

captive_portal:

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: components

ble_mesh_gateway:
  id: mesh_gateway

output:
  - platform: template
    id: mesh_output_group
    type: float
    write_action:
      - lambda: |
          static uint32_t last = 0;
          id(mesh_gateway).control_light(0xC000, state, last, 100, false,
                                         (uint32_t) id(mesh_transition_ms).state,
                                         (uint16_t) id(mesh_delay_ms).state);

number:
  - platform: template
    name: "Mesh Transition Time"
    id: mesh_transition_ms
    unit_of_measurement: ms
    min_value: 0
    max_value: 5000
    step: 100
    initial_value: 0
    restore_value: true
    optimistic: true
    mode: slider
    entity_category: config
  - platform: template
    name: "Mesh Delay"
    id: mesh_delay_ms
    unit_of_measurement: ms
    min_value: 0
    max_value: 1275
    step: 5
    initial_value: 0
    restore_value: true
    optimistic: true
    mode: slider
    entity_category: config
  - platform: template
    name: "Mesh Poll Interval"
    id: mesh_poll_interval
    unit_of_measurement: s
    min_value: 0
    max_value: 300
    step: 5
    initial_value: 60
    restore_value: true
    optimistic: true
    mode: slider
    entity_category: config

script:
  - id: mesh_poll
    mode: single
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - switch.is_off: prov_mode
          then:
            - esp32_ble_tracker.stop_scan:
            - delay: 300ms
            - lambda: ble_mesh_bridge_poll_onoff(0xC000);
            - delay: 1500ms
            - lambda: |-
                static int empty_polls = 0;
                int r = ble_mesh_bridge_take_poll_result();
                ble_mesh_bridge_poll_end();
                bool on;
                if (r == -2) {
                  empty_polls++;
                  if (empty_polls < 2)
                    return;
                  on = false;
                } else {
                  empty_polls = 0;
                  on = (r == 1);
                }
                id(mesh_lamps_responding).publish_state(r != -2);
                if (id(mesh_light_group).remote_values.is_on() != on) {
                  auto call = id(mesh_light_group).make_call();
                  call.set_state(on);
                  call.perform();
                }
            - esp32_ble_tracker.start_scan:

interval:
  - interval: 5s
    then:
      - lambda: |-
          static uint32_t last = 0;
          float iv = id(mesh_poll_interval).state;
          if (iv < 1) return;
          uint32_t now = millis();
          if (now - last < (uint32_t)(iv * 1000)) return;
          last = now;
          id(mesh_poll).execute();

binary_sensor:
  - platform: template
    name: "Mesh Lamps Responding"
    id: mesh_lamps_responding
    device_class: connectivity
    entity_category: diagnostic

switch:
  - platform: template
    name: "Mesh Provisioning Mode"
    id: prov_mode
    optimistic: true
    turn_on_action:
      - esp32_ble_tracker.stop_scan:
    turn_off_action:
      - esp32_ble_tracker.start_scan:

light:
  - platform: monochromatic
    name: "LEDVANCE Lamps"
    id: mesh_light_group
    output: mesh_output_group
    gamma_correct: 1.0
    default_transition_length: 0s


