---
substitutions:
  name: "esp32-c6"
  friendly_name: "ESP32 C6"

esphome:
  # compile_process_limit: 2
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BLE_MESH: "y"
      CONFIG_BLE_MESH_NODE: "y"
      CONFIG_BLE_MESH_PB_GATT: "y"
      CONFIG_BLE_MESH_PB_ADV: "y"
      CONFIG_BLE_MESH_GENERIC_SERVER: "y"
      CONFIG_BLE_MESH_GENERIC_CLIENT: "y"
      CONFIG_BLE_MESH_LIGHTING_CLIENT: "y"
      CONFIG_BLE_MESH_GENERIC_ONOFF_CLI: "y"
      CONFIG_BLE_MESH_GENERIC_LEVEL_CLI: "y"
      CONFIG_BLE_MESH_LIGHT_LIGHTNESS_CLI: "y"
      CONFIG_BLE_MESH_LIGHT_CTL_CLI: "y"
      CONFIG_BLE_MESH_NET_BUF_COUNT: "160"
      CONFIG_BLE_MESH_ADV_BUF_COUNT: "160"
      CONFIG_BLE_MESH_RX_SEG_MAX: "20"
      CONFIG_BLE_MESH_TX_SEG_MAX: "20"
      CONFIG_BLE_MESH_RELAY_MSG_COUNT: "20"
      CONFIG_BT_ENABLED: "y"
      CONFIG_BLE_MESH_SETTINGS: "y"

# LOGGER
logger:
  level: DEBUG

# API
api:
  encryption:
    key: !secret api_encryption_key
  services:
    # Service for brightness-only lamps (monochromatic)
    # address: mesh unicast address (decimal), brightness: 0-100, max_level: typically 50
    - service: set_mesh_light
      variables:
        address: int
        brightness: int
        max_level: int
      then:
        - lambda: |-
            static std::map<uint16_t, uint32_t> last_sends;
            float bright_f = brightness / 100.0f;
            id(mesh_gateway).control_light(address, bright_f, last_sends[address], max_level);

    # Service for HSL color lamps
    # brightness: 0-100, hue: 0-360, saturation: 0-100
    - service: set_mesh_light_hsl
      variables:
        address: int
        brightness: int
        hue: int
        saturation: int
        max_level: int
      then:
        - lambda: |-
            static std::map<uint16_t, uint32_t> last_sends;
            float bright_f = brightness / 100.0f;
            float hue_f = (float)hue;
            float sat_f = saturation / 100.0f;
            id(mesh_gateway).control_light_hsl(address, bright_f, hue_f, sat_f, last_sends[address], max_level);

    # Service for raw OnOff command
    # address: mesh unicast address (decimal), state: 0=OFF 1=ON, use_ack: 0=UNACK 1=ACK
    - service: set_mesh_onoff
      variables:
        address: int
        state: int
        use_ack: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_onoff((uint16_t)address, state != 0, use_ack != 0);

    # Query lightness range (min/max) from a lamp
    # Response logged via callback: "Lightness Range from 0xADDR: min=X, max=Y"
    - service: get_lightness_range
      variables:
        address: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_lightness_range_get((uint16_t)address);

    # Raw lightness SET command for testing lightness range
    # address: unicast addr, level: raw lightness value (0-65535), use_ack: 0=NO ACK, 1=ACK
    - service: set_mesh_lightness
      variables:
        address: int
        level: int
        use_ack: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_level((uint16_t)address, (uint16_t)level, use_ack != 0);

    # Raw CTL command for color temperature control
    # address: unicast addr, lightness: 0-65535, temperature: 800-20000 (Kelvin),
    # delta_uv: typically 0, use_ack: 0=NO ACK, 1=ACK
    - service: set_mesh_ctl
      variables:
        address: int
        lightness: int
        temperature: int
        use_ack: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_ctl((uint16_t)address, (uint16_t)lightness,
                                    (uint16_t)temperature, 0, use_ack != 0);

    # Query CTL temperature range from a lamp
    - service: get_ctl_temperature_range
      variables:
        address: int
      then:
        - lambda: |-
            ble_mesh_bridge_send_ctl_temperature_range_get((uint16_t)address);

# OTA
ota:
  - platform: esphome
    id: my_ota
    password: !secret ota_password

# WIFI
wifi:
  power_save_mode: NONE
  min_auth_mode: WPA2
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid_2
      password: !secret wifi_password_2
    - ssid: !secret wifi_ssid_3
      password: !secret wifi_password_3

  # Fallback AP
  ap:
    ssid: "${friendly_name}"
    password: !secret wifi_password

external_components:
  - source:
      type: local
      path: components
    components: [ble_mesh_gateway]

ble_mesh_gateway:
  id: mesh_gateway

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

# OUTPUT
output:
  # Lamp1: brightness via Lightness SET (ACK)
  - platform: template
    id: mesh_output_0004_brightness
    type: float
    write_action:
      - lambda: |
          id(lamp1_brightness) = state;
          if (state > 0.001f) {
            uint16_t lightness = (uint16_t)(state * 65535.0f);
            float ct = id(lamp1_color_temp);
            uint16_t temp_k = 800 + (uint16_t)(ct * 19200.0f);
            ble_mesh_bridge_send_level(0x0004, lightness, true);
            ble_mesh_bridge_send_ctl(0x0004, lightness, temp_k, 0, true);
          } else {
            ble_mesh_bridge_send_onoff(0x0004, false, true);
          }

  # Lamp1: color temperature via CTL SET (ACK)
  - platform: template
    id: mesh_output_0004_color_temp
    type: float
    write_action:
      - lambda: |
          id(lamp1_color_temp) = state;
          float bright = id(lamp1_brightness);
          if (bright > 0.001f) {
            uint16_t lightness = (uint16_t)(bright * 65535.0f);
            uint16_t temp_k = 800 + (uint16_t)(state * 19200.0f);
            ble_mesh_bridge_send_ctl(0x0004, lightness, temp_k, 0, true);
          }

  # Lamp2: brightness via Lightness SET
  - platform: template
    id: mesh_output_0005_brightness
    type: float
    write_action:
      - lambda: |
          id(lamp2_brightness) = state;
          if (state > 0.001f) {
            uint16_t lightness = (uint16_t)(state * 65535.0f);
            float ct = id(lamp2_color_temp);
            // Map full slider to mesh CTL range 800-20000
            uint16_t temp_k = 800 + (uint16_t)(ct * 19200.0f);
            // Send Lightness SET for brightness + CTL to maintain temperature
            ble_mesh_bridge_send_level(0x0005, lightness, false);
            ble_mesh_bridge_send_ctl(0x0005, lightness, temp_k, 0, false);
          } else {
            ble_mesh_bridge_send_onoff(0x0005, false, false);
          }

  # Lamp2: color temperature via CTL SET
  - platform: template
    id: mesh_output_0005_color_temp
    type: float
    write_action:
      - lambda: |
          id(lamp2_color_temp) = state;
          float bright = id(lamp2_brightness);
          if (bright > 0.001f) {
            uint16_t lightness = (uint16_t)(bright * 65535.0f);
            uint16_t temp_k = 800 + (uint16_t)(state * 19200.0f);
            ble_mesh_bridge_send_ctl(0x0005, lightness, temp_k, 0, false);
          }

# Globals for state tracking
globals:
  - id: lamp1_brightness
    type: float
    initial_value: '0.0'
  - id: lamp1_color_temp
    type: float
    initial_value: '0.5'
  - id: lamp2_brightness
    type: float
    initial_value: '0.0'
  - id: lamp2_color_temp
    type: float
    initial_value: '0.5'

# LIGHT
light:
  # Lamp1: brightness + color temperature (ACK)
  - platform: color_temperature
    name: "Lamp1"
    id: mesh_light_0004
    color_temperature: mesh_output_0004_color_temp
    brightness: mesh_output_0004_brightness
    cold_white_color_temperature: 6500 K
    warm_white_color_temperature: 2000 K
    gamma_correct: 1.0
    default_transition_length: 0s

  # Lamp2: brightness + color temperature
  - platform: color_temperature
    name: "Lamp2"
    id: mesh_light_0005
    color_temperature: mesh_output_0005_color_temp
    brightness: mesh_output_0005_brightness
    cold_white_color_temperature: 6500 K
    warm_white_color_temperature: 2000 K
    gamma_correct: 1.0
    default_transition_length: 0s
