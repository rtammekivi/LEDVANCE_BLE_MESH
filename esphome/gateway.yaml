# ESPHome BLE Mesh Gateway — ESP32 (standard)
#
# Basic example for ESP32 (not C6).
# Uses local component path for development.

esphome:
  name: ble-mesh-gateway
  friendly_name: BLE Mesh Gateway

external_components:
  - source:
      type: local
      path: components

ble_mesh_gateway:
  id: mesh_gateway

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BLE_MESH: "y"
      CONFIG_BLE_MESH_NODE: "y"
      CONFIG_BLE_MESH_PB_GATT: "y"
      CONFIG_BLE_MESH_PB_ADV: "y"
      CONFIG_BLE_MESH_GENERIC_SERVER: "y"
      CONFIG_BLE_MESH_GENERIC_CLIENT: "y"
      CONFIG_BLE_MESH_LIGHTING_CLIENT: "y"
      CONFIG_BLE_MESH_GENERIC_ONOFF_CLI: "y"
      CONFIG_BLE_MESH_GENERIC_LEVEL_CLI: "y"
      CONFIG_BLE_MESH_LIGHT_LIGHTNESS_CLI: "y"
      CONFIG_BLE_MESH_LIGHT_CTL_CLI: "y"
      CONFIG_BLE_MESH_NET_BUF_COUNT: "160"
      CONFIG_BLE_MESH_ADV_BUF_COUNT: "160"
      CONFIG_BLE_MESH_RX_SEG_MAX: "20"
      CONFIG_BLE_MESH_TX_SEG_MAX: "20"
      CONFIG_BLE_MESH_RELAY_MSG_COUNT: "20"
      CONFIG_BT_ENABLED: "y"
      CONFIG_BLE_MESH_SETTINGS: "y"

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

logger:
  level: DEBUG

api:
  password: ""

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "BLE Mesh Gateway Fallback"
    password: ""

# --- Example lamps (replace addresses) ---
output:
  - platform: template
    id: mesh_output_0020
    type: float
    write_action:
      - lambda: |
          static uint32_t last = 0;
          id(mesh_gateway).control_light(0x0020, state, last, 65535);

  - platform: template
    id: mesh_output_0015
    type: float
    write_action:
      - lambda: |
          static uint32_t last = 0;
          id(mesh_gateway).control_light(0x0015, state, last, 65535);

light:
  - platform: monochromatic
    name: "Tischlampe"
    id: mesh_light_0020
    output: mesh_output_0020
    gamma_correct: 1.0
    default_transition_length: 0s

  - platform: monochromatic
    name: "Flur"
    id: mesh_light_0015
    output: mesh_output_0015
    gamma_correct: 1.0
    default_transition_length: 0s
