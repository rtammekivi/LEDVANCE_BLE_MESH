# Home Assistant Configuration for BLE Mesh Lamps
#
# Add this to your Home Assistant configuration.yaml
# Replace the ESPHome device name with yours
# (e.g., esphome.ble_mesh_gateway_c6_set_mesh_onoff)
#
# NOTE: If using the ESPHome light entities directly (recommended),
# you don't need this file. These entities are auto-discovered by HA.
# This file is only needed for service-based control without ESPHome light entities.

# ============================================================
# Option 1: Service-based control (dynamic, no recompilation)
# ============================================================

# Template lights using ESPHome services
light:
  - platform: template
    lights:
      # --- Brightness-only lamp ---
      mesh_tischlampe:
        friendly_name: "Tischlampe"
        turn_on:
          - service: esphome.ble_mesh_gateway_c6_set_mesh_onoff
            data:
              address: 32  # 0x0020 in decimal
              state: 1
              use_ack: 0
        turn_off:
          - service: esphome.ble_mesh_gateway_c6_set_mesh_onoff
            data:
              address: 32
              state: 0
              use_ack: 0
        set_level:
          - service: esphome.ble_mesh_gateway_c6_set_mesh_lightness
            data:
              address: 32
              level: "{{ (brightness / 255 * 65535) | int }}"
              use_ack: 0

      # --- Color temperature lamp (via CTL) ---
      # For full CTL control, use the ESPHome color_temperature
      # light entity instead (see gateway-c6-ha.yaml).
      # This service-based approach only controls brightness.
      mesh_color_lamp:
        friendly_name: "Color Lamp"
        turn_on:
          - service: esphome.ble_mesh_gateway_c6_set_mesh_ctl
            data:
              address: 33  # 0x0021 in decimal
              lightness: 65535
              temperature: 4000
              use_ack: 0
        turn_off:
          - service: esphome.ble_mesh_gateway_c6_set_mesh_onoff
            data:
              address: 33
              state: 0
              use_ack: 0
        set_level:
          - service: esphome.ble_mesh_gateway_c6_set_mesh_ctl
            data:
              address: 33
              lightness: "{{ (brightness / 255 * 65535) | int }}"
              temperature: 4000  # Fixed temperature; for dynamic, use automations
              use_ack: 0

# ============================================================
# Option 2 (Recommended): Use ESPHome light entities directly
# ============================================================
#
# If you define lights in your ESPHome YAML (gateway-c6-ha.yaml),
# they are automatically discovered by Home Assistant.
# No configuration.yaml changes needed.
#
# Example ESPHome config for color temperature lamp:
#
#   light:
#     - platform: color_temperature
#       name: "My Lamp"
#       color_temperature: mesh_output_color_temp
#       brightness: mesh_output_brightness
#       cold_white_color_temperature: 6500 K
#       warm_white_color_temperature: 2000 K
#
# See gateway-c6-ha.yaml and esp32-c6-generic-sigmesh.yaml for full examples.
